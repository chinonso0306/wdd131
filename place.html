<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nigeria | Country Page</title>
  <meta name="description" content="Country page for Nigeria with weather and cultural highlights">
  <meta name="author" content="Chinonso Echefu">

  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>

<body>

  <header class="hero">
    <picture>
      <source srcset="images/hero-small.webp" media="(max-width: 500px)">
      <source srcset="images/hero-medium.webp" media="(max-width: 1000px)">
      <<img src="images/hero-large.webp"
     alt="Landscape of Nigeria"
     width="100%"
     height="auto">
    </picture>

    <div class="hero-text">
      <h1>Nigeria</h1>
      <p>Land of Cultures and Energy</p>
    </div>
  </header>

  <main>

    <section class="info">
      <h2>About Nigeria</h2>
      <p>
        Nigeria is a vibrant West African country known for its diverse culture, music, and landscapes.
      </p>
    </section>

    <section id="weather" class="weather">
      <h2>Weather</h2>

      <!-- SVG REQUIRED FOR MOBILE -->
      <img src="images/weather.svg" alt="Weather icon">

      <p>Temperature: <span id="temp">30</span> °C</p>
      <p>Wind Speed: <span id="wind">10</span> km/h</p>
      <p>Wind Chill: <span id="chill"></span></p>
    </section>

  </main>

  <footer>
    <p>&copy; <span id="year"></span> Nigeria Page</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>

</body>
</html>
